<div class="signup-container">
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <mat-card class="signup-card">
    <mat-card-header>
      <div class="logo-container">
        <mat-icon color="primary">rocket_launch</mat-icon>
        <h1 class="brand-name">TeamTask</h1>
      </div>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Join thousands of teams managing work better</mat-card-subtitle>
    </mat-card-header>

    <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

    <mat-card-content>
      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">
        <div class="name-row">
          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" placeholder="John">
            <mat-error *ngIf="signupForm.get('firstName')?.hasError('required')">Required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" placeholder="Doe">
            <mat-error *ngIf="signupForm.get('lastName')?.hasError('required')">Required</mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="john@example.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="signupForm.get('email')?.hasError('email')">Invalid email</mat-error>
          <mat-error *ngIf="signupForm.get('email')?.hasError('required')">Email is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="signupForm.get('password')?.hasError('required')">Required</mat-error>
          <mat-error *ngIf="signupForm.get('password')?.hasError('minlength')">At least 6 chars</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="confirmPassword">
          <mat-error *ngIf="signupForm.hasError('mismatch')">Passwords do not match</mat-error>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="signupForm.invalid || isLoading" class="submit-btn">
            Create Account
          </button>
        </div>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <div class="footer-content">
        <span>Already have an account?</span>
        <a routerLink="/auth/login" mat-button color="accent">Sign In</a>
      </div>
    </mat-card-footer>
  </mat-card>
</div>
